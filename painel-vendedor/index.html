<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Vendedor — Seller Sync</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e12;--sidebar:#10131a;--card:#161a24;--border:#1e2435;
  --txt:#e4eaf5;--mut:#7b8aaa;--acc:#22c55e;--acc2:#16a34a;
  --gold:#f59e0b;--blue:#3b82f6;
  --font:system-ui,'Segoe UI',Roboto,sans-serif;
}
html,body{height:100%}
body{font:15px/1.55 var(--font);background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
.sidebar-count{font-size:11px;color:var(--acc);margin-top:2px}
.sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-search input{width:100%;background:#1a1f2e;border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--txt);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--acc)}
.lead-list{flex:1;overflow-y:auto;padding:8px}
.lead-item{display:flex;gap:10px;align-items:center;padding:10px 10px;border-radius:10px;cursor:pointer;
  transition:background .15s;margin-bottom:3px;border:1px solid transparent}
.lead-item:hover{background:var(--card)}
.lead-item.active{background:var(--card);border-color:var(--acc)}
.lead-thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.lead-thumb-placeholder{width:42px;height:42px;border-radius:8px;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-cat{font-size:11px;color:var(--mut);margin-top:1px}
.lead-rating{font-size:11px;color:var(--gold);margin-left:auto;flex-shrink:0}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--mut)}
.empty-state .big{font-size:48px}
.empty-state p{font-size:14px}

/* LEAD DETAIL */
.detail{padding:28px 32px;max-width:980px}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:24px;flex-wrap:wrap;gap:12px}
.detail-name{font-size:24px;font-weight:700;line-height:1.2}
.detail-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:12px;background:var(--card);border:1px solid var(--border)}
.tag.green{border-color:rgba(34,197,94,.3);color:var(--acc)}
.tag.gold{border-color:rgba(245,158,11,.3);color:var(--gold)}
.tag.blue{border-color:rgba(59,130,246,.3);color:var(--blue)}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;border:0;text-decoration:none;color:#fff;
  background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 4px 16px -4px rgba(34,197,94,.4);
  transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(34,197,94,.5)}
.btn.ghost{background:var(--card);box-shadow:none;border:1px solid var(--border);color:var(--txt)}
.btn.ghost:hover{border-color:var(--acc);color:var(--acc);box-shadow:none;transform:none}
.btn.copied{background:#1e3a2a;border-color:var(--acc);color:var(--acc)}
.btn.danger{background:linear-gradient(135deg,#dc2626,#b91c1c);box-shadow:0 4px 16px -4px rgba(220,38,38,.4)}
.btn.danger:hover{transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(220,38,38,.5)}
.btn.warn{background:linear-gradient(135deg,#d97706,#b45309);box-shadow:0 4px 16px -4px rgba(217,119,6,.4)}
.btn.warn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(217,119,6,.5)}
.btn.ghost-active{background:#1e2435;border-color:var(--acc);color:var(--acc)}
.btn.info{background:linear-gradient(135deg,#0284c7,#0369a1);box-shadow:0 4px 16px -4px rgba(2,132,199,.4)}
.btn.info:hover{transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(2,132,199,.5)}
.btn.ok{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 16px -4px rgba(22,163,74,.4)}
.btn.ok:hover{transform:translateY(-2px);box-shadow:0 8px 20px -4px rgba(22,163,74,.5)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.msg{background:#22c55e}
.dot.rej{background:#ef4444}
.dot.rev{background:#0ea5e9}
/* FILTER BAR */
.filter-bar{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-pill{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--mut);cursor:pointer;transition:.15s;white-space:nowrap}
.filter-pill:hover{border-color:var(--acc);color:var(--txt)}
.filter-pill.on{background:var(--card);border-color:var(--acc);color:var(--txt)}
.filter-pill.on.rej{border-color:#ef4444;color:#fca5a5}
.filter-pill.on.msg{border-color:#22c55e;color:var(--acc)}
.filter-pill.on.rev{border-color:#0ea5e9;color:#7dd3fc}
/* STATS */
.stats-bar{font-size:11px;color:var(--mut);padding:5px 16px 8px;display:flex;gap:12px;flex-shrink:0}
/* REJECTED BANNER */
.rej-banner{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;
  padding:13px 15px;margin-bottom:20px;color:#fca5a5;font-size:13px;display:flex;flex-direction:column;gap:9px}
.rej-head{display:flex;align-items:center;gap:8px}
.rej-note-label{font-size:11px;color:#fca5a5;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.rej-note{width:100%;background:#1a1f2e;border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--txt);
  font:13px/1.5 var(--font);padding:10px 12px;resize:vertical;min-height:62px;outline:none}
.rej-note:focus{border-color:#ef4444}
.rej-note::placeholder{color:var(--mut)}
.rej-note-hint{font-size:11px;color:var(--acc);min-height:14px}
/* RE-ANALISE BANNER */
.rev-banner{background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.3);border-radius:10px;
  padding:13px 15px;margin-bottom:20px;color:#7dd3fc;font-size:13px;display:flex;flex-direction:column;gap:8px}
.rev-banner .rev-head{display:flex;align-items:center;gap:8px}
.rev-banner .rev-prev{font-size:12px;color:var(--mut);line-height:1.5;background:#161a24;border-radius:7px;padding:8px 11px}
.rev-banner .rev-prev b{color:#fca5a5}
/* PREVIEW (imagem do site p/ mandar pro cliente) */
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:22px}
.preview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:8px}
.preview-head .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
.preview-actions{display:flex;gap:8px;flex-wrap:wrap}
.preview-frame{max-height:560px;overflow-y:auto;border-radius:8px;border:1px solid var(--border);background:#0a0c10}
.preview-frame::-webkit-scrollbar{width:8px}.preview-frame::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.preview-img{width:100%;display:block}
.preview-loading{padding:40px;text-align:center;color:var(--mut);font-size:13px}
/* STATUS ACTIONS */
.status-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

/* SITE URL */
.site-url-box{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.site-url-label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.site-url-text{font-size:13px;color:var(--blue);flex:1;word-break:break-all}

/* SECTIONS */
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:28px}
.gallery a{display:block;border-radius:8px;overflow:hidden;border:1px solid var(--border);
  aspect-ratio:1;transition:.2s}
.gallery a:hover{border-color:var(--acc);transform:scale(1.02)}
.gallery img{width:100%;height:100%;object-fit:cover;display:block}
.no-images{color:var(--mut);font-size:13px;background:var(--card);border-radius:8px;
  padding:16px;border:1px dashed var(--border);margin-bottom:28px}

/* COPY BLOCKS */
.copy-blocks{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.copy-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.copy-card-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border)}
.copy-card-head h3{font-size:14px;font-weight:600}
.copy-btn{background:#1a1f2e;border:1px solid var(--border);border-radius:7px;
  padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mut);transition:.15s;white-space:nowrap}
.copy-btn:hover{border-color:var(--acc);color:var(--acc)}
.copy-btn.ok{background:rgba(34,197,94,.15);border-color:var(--acc);color:var(--acc)}
pre.copy-text{padding:14px 16px;font:13px/1.7 var(--font);color:#c8d6f0;white-space:pre-wrap;
  word-break:break-word}

/* CONTACT */
.contact-box{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.contact-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:13px}
.contact-item .label{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.contact-item .val{font-weight:600;margin-top:1px}
.contact-item a{color:var(--blue);text-decoration:none}
.contact-item a:hover{text-decoration:underline}

/* SCROLLBAR */
.lead-list::-webkit-scrollbar,.main::-webkit-scrollbar{width:5px}
.lead-list::-webkit-scrollbar-track,.main::-webkit-scrollbar-track{background:transparent}
.lead-list::-webkit-scrollbar-thumb,.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* RESPONSIVE */
@media(max-width:700px){
  body{flex-direction:column}
  .sidebar{width:100%;height:200px;flex-shrink:0}
  .lead-list{display:flex;flex-direction:row;gap:6px;overflow-x:auto;overflow-y:hidden;padding:8px}
  .lead-item{flex-direction:column;min-width:100px;text-align:center}
  .detail{padding:16px}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Painel do Vendedor</div>
    <div class="sidebar-count" id="countLabel"></div>
  </div>
  <div class="sidebar-search">
    <input type="search" id="searchInput" placeholder="Buscar lead...">

    <button class="filter-pill rej" data-filter="rej" onclick="setFilter('rej',this)">✗ Reprovados</button>
    <button class="filter-pill rev" data-filter="reanalise" onclick="setFilter('reanalise',this)">↻ Re-análise</button>
    <button class="filter-pill" data-filter="pending" onclick="setFilter('pending',this)">Pendentes</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="lead-list" id="leadList"></div>
</nav>

<main class="main" id="main">

    <p>Selecione um lead na lateral para ver os detalhes</p>
  </div>
  <div class="detail" id="detail" style="display:none"></div>
</main>

ço premium, equipe com foto editorial — e zero presença no Google.\"\n\n*CTA:*  \n\"Me manda o link\" · \"Quero ver como ficou\" · \"Quanto custa?\""},{"title":"Quebra de objeções","text":"*\"Tenho Instagram e funciona.\"*  \nInstagram é ótimo pra quem já te segue. Mas quando um homem novo em Contagem pesquisa \"barbearia\" no Google — ele nem sabe que o @augustosbarber existe. Site aparece; Instagram não.\n\n*\"É caro.\"*  \n2 cortes por semana a mais já cobrem. A questão é: com um espaço desse nível, quantos clientes estão indo pra barbearia ao lado só porque ela aparece no Google e você não?\n\n*\"Não tenho tempo pra mexer.\"*  \nNão mexe em nada. A gente entrega pronto — com as suas fotos, do seu jeito. Você só olha e fala \"aprovado\".\n\n*\"Já tenho WhatsApp pra agendamento.\"*  \nWhatsApp fecha quem já te conhece. Site traz quem ainda não conhece. Os dois juntos fecham mais."},{"title":"Sequência","text":"1. Mensagem no WhatsApp *(31) 99158-9751* — item 1\n2. Interesse → link do site + item 2\n3. Objeção → item 4\n4. Fechar: \"Posso te ligar em 5 minutos pra mostrar como ficou?\""}]},{"slug":"barbearia-brasil-0fe7dee6","name":"Barbearia Brasil","category":"Barbearia","phone":"(98) 99164-7633","whatsapp":"5598991647633","rating":4.7,"instagram":"barbearia_brasil","presence":"BUILDER_SITE","address":"R. Pernambuco, n° 157 - Chácara Brasil, São Luís - MA, 65065-851","siteUrl":"https://barbearia-brasil-0fe7dee6.tiectu.easypanel.host","mapsUrl":"https://www.google.com/maps/place/Barbearia+Brasil/@-2.5054681,-44.2194587,17z/data=!3m1!4b1!4m6!3m5!1s0x7f692258cdb3677:0x44282ce0fe7dee6!8m2!3d-2.5054681!4d-44.2194587!16s%2Fg%2F11c51wbfmd?authuser=0&hl=pt-BR&entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D","images":["insta-1.jpg","insta-2.jpg","insta-3.jpg","insta-4.jpg","insta-5.jpg","insta-6.jpg","insta-7.jpg","insta-8.jpg","maps-1.jpg","maps-2.jpg","maps-3.jpg","maps-4.jpg","maps-8.jpg"],"copy":[{"title":"Mensagem de abordagem (PAS — curta)","text":"Fala, time da const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderSidebar(leads) {
  const list = document.getElementById('leadList');
  document.getElementById('countLabel').textContent = leads.length + ' leads';
  updateStats();
  list.innerHTML = leads.map((l,i) => {
    const thumb = l.images[0]
      ? `<img class="lead-thumb" src="${esc(l.siteUrl)}/imagens/${esc(l.images[0])}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const emoji = l.category.includes('arbear')||l.category.includes('Barbearia') ? '💈'
      : l.category.includes('Pizza') ? '🍕'
      : l.category.includes('saúde')||l.category.includes('stética') ? '✨' : '🏢';
    const st = getState(l.slug);
    const dot = st.rej ? `<span class="dot rej" title="Site reprovado"></span>`
               : st.reanalise ? `<span class="dot rev" title="Em re-análise"></span>`
               : st.msg ? `<span class="dot msg" title="Mensagem enviada"></span>` : '';
    return `<div class="lead-item" data-idx="${l._idx}" onclick="selectLead(${l._idx})">
      ${thumb}
      <div class="lead-thumb-placeholder" style="${thumb?'display:none':''}">${emoji}</div>
      <div class="lead-info">
        <div class="lead-name">${esc(l.name)}</div>
        <div class="lead-cat">${esc(l.category)}</div>
      </div>
      ${dot || (l.rating ? `<div class="lead-rating">★ ${l.rating}</div>` : '')}
    </div>`;
  }).join('');
}

function copyBlock(btn, leadIdx, blockIdx) {
  const text = document.getElementById(`cb-${leadIdx}-${blockIdx}`).innerText;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 1500);
  });
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

// ── STATE (servidor COMPARTILHADO — todos veem os mesmos status) ───
let STATUS = {};
let currentIdx = null;
let editingReason = false;   // trava o re-render do detalhe enquanto digita o motivo
const API = '/api/status';

function getStates() { return STATUS; }
function getState(slug) { return STATUS[slug] || {}; }

function refreshUI() {
  renderSidebar(applyFilter());
  // nao re-renderiza o detalhe se o vendedor esta escrevendo o motivo (perderia o texto/foco)
  if (currentIdx != null && !editingReason) selectLead(currentIdx);
}

async function saveReason(slug, text) {
  if (text === (getState(slug).reason || '')) return;  // nada mudou
  await patchState(slug, { reason: text });
  const h = document.getElementById('rejNoteHint');
  if (h) { h.textContent = '✓ motivo salvo'; setTimeout(() => { const e = document.getElementById('rejNoteHint'); if (e) e.textContent = ''; }, 1800); }
}

async function loadStatus(silent) {
  try {
    const r = await fetch(API, { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    STATUS = await r.json();
    refreshUI();
  } catch (e) {
    if (!silent) console.warn('Falha ao carregar status do servidor:', e.message);
  }
}

async function patchState(slug, patch) {
  STATUS[slug] = Object.assign({}, STATUS[slug] || {}, patch);  // otimista
  refreshUI();
  try {
    const r = await fetch(API + '/' + encodeURIComponent(slug), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(patch)
    });
    if (!r.ok) throw new Error('http ' + r.status);
    STATUS[slug] = await r.json();   // confirmado pelo servidor
    refreshUI();
  } catch (e) {
    console.warn('Falha ao salvar status no servidor:', e.message);
    await loadStatus(true);          // reverte para o estado real do servidor
  }
}

function toggleMsg(slug)       { patchState(slug, { msg: !getState(slug).msg }); }
// Esteira de qualidade: reprovado → (ajuste) → re-análise → aprovado
function reject(slug)          { patchState(slug, { rej: true,  reanalise: false }); }       // reprova
function undoReject(slug)      { patchState(slug, { rej: false, reanalise: false }); }        // desfaz reprovação
function sendToReanalise(slug) { patchState(slug, { rej: false, reanalise: true }); }         // ajustei → re-análise
function rejectAgain(slug)     { patchState(slug, { rej: true,  reanalise: false }); }         // reprova de novo
function approveLead(slug)     { patchState(slug, { rej: false, reanalise: false, reason: '' }); } // aprovado, limpa

// ── FILTERS ───────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  renderSidebar(applyFilter());
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return LEADS.filter(l => {
    const st = getState(l.slug);
    const matchQ = !q || l.name.toLowerCase().includes(q) || l.category.toLowerCase().includes(q) || l.phone.includes(q);
    if (!matchQ) return false;
    if (activeFilter === 'msg') return st.msg;
    if (activeFilter === 'rej') return st.rej;
    if (activeFilter === 'reanalise') return st.reanalise;
    if (activeFilter === 'pending') return !st.msg && !st.rej && !st.reanalise;
    return true;
  });
}

function updateStats() {
  const all = getStates();
  const msgCount = LEADS.filter(l => all[l.slug]?.msg).length;
  const rejCount = LEADS.filter(l => all[l.slug]?.rej).length;
  const revCount = LEADS.filter(l => all[l.slug]?.reanalise).length;
  const bar = document.getElementById('statsBar');
  if (bar) bar.innerHTML = [
    msgCount ? `<span style="color:var(--acc)">✉ ${msgCount} enviados</span>` : '',
    rejCount ? `<span style="color:#ef4444">✗ ${rejCount} reprovados</span>` : '',
    revCount ? `<span style="color:#7dd3fc">↻ ${revCount} re-análise</span>` : '',
    (!msgCount && !rejCount && !revCount) ? '<span>Nenhum status ainda</span>' : '',
  ].filter(Boolean).join('<span style="opacity:.3">·</span>');
}

// ── INIT ──────────────────────────────────────────────────────────
LEADS.forEach((l, i) => l._idx = i);

renderSidebar(applyFilter());

document.getElementById('searchInput').addEventListener('input', () => renderSidebar(applyFilter()));

// Select first lead on load
if (LEADS.length) selectLead(0);

// Estado compartilhado: carrega do servidor e acompanha mudancas de outros vendedores
loadStatus();
setInterval(() => loadStatus(true), 15000);
</script>
</body>
